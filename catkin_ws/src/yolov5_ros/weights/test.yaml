# 数据集根目录的路径
path: /home/ljk/smart_car/data/dataset  # 例如：/home/user/datasets/coco128

# 各个子集（训练、验证、测试）的目录。
# 这些路径是相对于 'path' 的，也可以是绝对路径。
train: images/train  # 训练集图像目录
val: images/val      # 验证集图像目录


# 类别数量
nc: 9  # 根据你的数据集修改，例如 COCO 是 80，VOC 是 20

# 类别名称列表
names: 
  0: apple
  1: banana
  2: watermelon
  3: potato
  4: tomato
  5: chili
  6: cake
  7: milk
  8: cola
